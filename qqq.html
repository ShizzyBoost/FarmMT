<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FUTURE OF FULFILLMENT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0c;
    }

    .video-bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .video-bg.loaded { opacity: 1; }

    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(145deg, rgba(0,0,0,0.55) 0%, rgba(15,20,30,0.3) 100%);
      backdrop-filter: blur(2px);
      z-index: -1;
    }

    .content {
      position: relative; z-index: 10;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      color: white;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    .headline {
      font-size: clamp(3rem, 15vw, 6.5rem);
      font-weight: 700; letter-spacing: -0.02em;
      line-height: 1.1; margin-bottom: 1.2rem;
      animation: fadeUp 1.2s cubic-bezier(0.2,0.9,0.3,1) forwards;
      opacity: 0; transform: translateY(30px);
      text-transform: uppercase;
      background: linear-gradient(to right, #fff, #d6e3ff);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(70,160,255,0.3);
    }

    .subhead {
      font-size: clamp(1rem, 4vw, 1.5rem);
      font-weight: 300; letter-spacing: 0.3em;
      margin-bottom: 2.8rem;
      animation: fadeUp 1.2s 0.2s forwards;
      opacity: 0; transform: translateY(30px);
      color: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      padding: 0.3rem 1.8rem; border-radius: 60px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      display: inline-block;
    }

    .btn {
      display: inline-block; padding: 1rem 3rem;
      font-size: 1.1rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: white;
      background: transparent; border: 2px solid rgba(255,255,255,0.4);
      border-radius: 60px; backdrop-filter: blur(12px);
      background: rgba(10, 20, 40, 0.25);
      box-shadow: 0 0 25px rgba(0, 160, 255, 0.2);
      cursor: pointer; text-decoration: none;
      transition: all 0.35s ease;
      animation: fadeUp 1.2s 0.4s forwards;
      opacity: 0; transform: translateY(30px);
    }
    .btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.9);
      box-shadow: 0 0 40px rgba(70, 180, 255, 0.6);
      transform: scale(1.02) translateY(-3px);
    }

    .footer-note {
      position: absolute; bottom: 2.5rem; left: 0; right: 0;
      text-align: center; font-size: 0.75rem; font-weight: 300;
      letter-spacing: 0.4em; color: rgba(255,255,255,0.5);
      z-index: 20; animation: fadeUp 1.5s 0.8s forwards; opacity: 0;
    }

    .debug-msg {
      position: absolute; bottom: 1rem; left: 1rem;
      z-index: 50; color: rgba(255,200,100,0.9);
      background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
      padding: 0.3rem 1rem; border-radius: 40px;
      font-size: 0.7rem; border: 1px solid rgba(255,215,0,0.3);
      pointer-events: none;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) {
      .btn { padding: 0.9rem 2rem; font-size: 0.9rem; }
      .subhead { letter-spacing: 0.2em; padding: 0.2rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- ВИДЕО -->
  <video class="video-bg" autoplay muted loop playsinline preload="auto" disableRemotePlayback>
    <source src="mp4/background.mp4" type="video/mp4">
    Ваш браузер не поддерживает видео.
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1 class="headline">FUTURE OF<br>FULFILLMENT</h1>
    <div class="subhead">IS HERE</div>
    <a href="#" class="btn">Explore →</a>
  </div>

  <div class="footer-note">SEAMLESS • AUTONOMOUS • INFINITE</div>
  
  <!-- Сообщение для отладки (будет показывать статус видео) -->
  <div class="debug-msg" id="videoStatus">⏳ загрузка видео...</div>

  <script>
    (function() {
      const video = document.querySelector('.video-bg');
      const statusEl = document.getElementById('videoStatus');
      
      // Функция обновления статуса
      function setStatus(text, isGood = true) {
        if (statusEl) {
          statusEl.textContent = text;
          statusEl.style.color = isGood ? 'rgba(150,255,150,0.9)' : 'rgba(255,180,100,0.9)';
        }
      }

      // Проверяем, поддерживается ли видео
      if (!video) return;

      // Добавляем класс после начала воспроизведения (для плавного появления)
      video.addEventListener('loadeddata', () => {
        video.classList.add('loaded');
        setStatus('✅ видео загружено', true);
      });

      video.addEventListener('play', () => {
        setStatus('▶️ видео играет', true);
      });

      video.addEventListener('pause', () => {
        if (!video.ended) setStatus('⏸️ видео на паузе', false);
      });

      video.addEventListener('error', (e) => {
        console.warn('Ошибка видео:', e);
        setStatus('❌ ошибка загрузки видео. Проверьте путь mp4/background.mp4', false);
        video.classList.add('loaded'); // всё равно показываем фон
      });

      // Явная попытка воспроизведения (на случай, если autoplay не сработал)
      const playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          setStatus('▶️ автовоспроизведение ок', true);
        }).catch(err => {
          console.warn('Автовоспроизведение заблокировано:', err);
          setStatus('🔇 автовоспроизведение заблокировано, но muted должно работать', false);
          // Пытаемся ещё раз с небольшим таймаутом (иногда помогает)
          setTimeout(() => {
            video.play().catch(e => setStatus('⚠️ не удалось запустить видео', false));
          }, 300);
        });
      }

      // Дополнительно: если видео висит на "загрузка..." более 5 сек, предупреждаем
      setTimeout(() => {
        if (video.readyState < 3) { // HAVE_FUTURE_DATA = 3
          setStatus('⌛ видео долго грузится, проверьте файл', false);
        }
      }, 5000);

      // Полезная подсказка в консоли
      console.log('🎥 Видео ищется по пути: mp4/background.mp4. Убедитесь, что файл существует и называется правильно.');
    })();
  </script>

  <!-- 
    🔧 ИНСТРУКЦИЯ:
    1. Убедитесь, что рядом с этим HTML-файлом есть папка "mp4".
    2. Внутри папки "mp4" находится файл "background.mp4" (или переименуйте src в теге source).
    3. Откройте страницу через локальный сервер (например, Live Server в VS Code) или напрямую из файла.
       Некоторые браузеры ограничивают автовоспроизведение при открытии file://, лучше использовать http://.
  -->
</body>
</html>
